services:
  rails:
    build:
      context: .
      dockerfile: Dockerfile.rails
    ports:
      - "3000:3000"
    volumes:
      - ./rails/storage/presets:/app/storage/presets
      - rails_db:/app/db          # named volume — keeps migrations intact inside image
      - ./rails/log:/app/log
    environment:
      RAILS_ENV: development
      RAILS_LOG_TO_STDOUT: "1"
      JWT_SECRET: ${JWT_SECRET:-audiobunny-dev-secret}
    command: >
      sh -c "bundle exec rails db:create db:migrate db:seed &&
             bundle exec rails server -b 0.0.0.0 -p 3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/plugins"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE: http://localhost:3000
    command: sh -c "npm install --silent && npm run dev -- --host 0.0.0.0"
    depends_on:
      - rails   # start after rails container exists; no health gate needed for Vite

volumes:
  rails_db:
  frontend_node_modules:
