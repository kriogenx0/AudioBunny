services:
  rails:
    build:
      context: .
      dockerfile: Dockerfile.rails
    ports:
      - "3000:3000"
    volumes:
      - ./rails/storage/presets:/app/storage/presets
      - ./rails/db:/app/db
      - ./rails/log:/app/log
    environment:
      RAILS_ENV: development
      JWT_SECRET: ${JWT_SECRET:-audiobunny-dev-secret}
    command: >
      sh -c "bundle exec rails db:create db:migrate db:seed 2>/dev/null; bundle exec rails server -b 0.0.0.0 -p 3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/plugins"]
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE: http://localhost:3000
    command: sh -c "npm install --silent && npm run dev -- --host 0.0.0.0"
    depends_on:
      rails:
        condition: service_healthy

volumes:
  frontend_node_modules:
