# ── AudioBunny nginx configuration ───────────────────────────────────────────
#
# Intended for production server deployments (see deploy/fabfile.py).
# Place this file at /etc/nginx/sites-available/audiobunny and symlink:
#
#   sudo ln -s /etc/nginx/sites-available/audiobunny \
#              /etc/nginx/sites-enabled/audiobunny
#   sudo nginx -t && sudo systemctl reload nginx
#
# Variables to update before use:
#   - server_name   your domain(s)
#   - root          path to the built frontend (frontend/dist)
# ─────────────────────────────────────────────────────────────────────────────

upstream audiobunny_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name audiobunny.example.com;

    # Redirect all HTTP to HTTPS (uncomment after setting up TLS)
    # return 301 https://$host$request_uri;

    root /var/www/audiobunny/current/frontend/dist;
    index index.html;

    # ── API proxy ─────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://audiobunny_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection       "";
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── React SPA (client-side routing) ──────────────────────────────────────
    location / {
        try_files $uri /index.html;
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options       SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy       strict-origin-when-cross-origin;

    # ── Static asset caching ──────────────────────────────────────────────────
    location ~* \.(?:js|css|woff2?|png|jpg|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

